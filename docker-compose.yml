services:

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override service hostnames for Docker networking
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      OLLAMA_URL: http://ollama:11434
    volumes:
      # Persist SQLite database and uploaded files between restarts
      - api_data:/app/kpip.db
      - uploads:/app/uploads
      # Mount PP Form templates if available (optional — remove if not needed)
      # - ./pp_templates:/app/pp_templates:ro
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React Frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Neo4j Graph Database ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-ChangeMe_Neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_db_default__database: ${NEO4J_DATABASE:-prosecutorreport}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Qdrant Vector Database ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Ollama LLM Server ────────────────────────────────────────────────────────
  # Comment out this service if you're using a remote Ollama instance.
  # After first `docker compose up`, pull a model with:
  #   docker compose exec ollama ollama pull qwen:8b
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  api_data:
  uploads:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  ollama_data:
